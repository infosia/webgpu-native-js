[[lifecycle.methods]]
interface = "GPUComputePassEncoder"
member = "dispatchWorkgroups"
path = "compute_pass_dispatch_workgroups"

[[lifecycle.methods]]
interface = "GPUComputePassEncoder"
member = "end"
path = "compute_pass_end"

[[lifecycle.properties]]
interface = "GPUDevice"
member = "queue"
get = "device_queue_get"

[[lifecycle.properties]]
interface = "GPUBuffer"
member = "label"
get = "buffer_label_get"
set = "buffer_label_set"

[[lifecycle.properties]]
interface = "GPUBuffer"
member = "size"
get = "buffer_size_get"

[[lifecycle.properties]]
interface = "GPUBuffer"
member = "usage"
get = "buffer_usage_get"

[[lifecycle.omitted_methods]]
interface = "GPUDevice"
member = "destroy"
reason = "preserved quirk: GPUDevice.destroy is selected for dispatch accounting but was not exposed by the shipped class table"

[[lifecycle.quirks]]
interface = "GPUCommandEncoder"
kind = "stateful_encoder_payload"
reason = "B10/B19 keep the encoder handle in shared ended-state and pass null for an omitted optional descriptor"

[[descriptor]]
dictionary = "GPUBufferDescriptor"
target = "BufferDescriptor"

[[descriptor.strings]]
member = "label"
nullable = false

[[descriptor]]
dictionary = "GPUSamplerDescriptor"

[[descriptor.strings]]
member = "label"
nullable = false

