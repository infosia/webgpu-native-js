# Codegen policy schema, version 1.
#
# `[[subset]]` selects one WebIDL interface and the exact logical WebIDL member
# names included in this slice. Interface names and member names are checked
# against the parsed IDL. Unknown or duplicate entries fail the run. Interfaces
# that join by the GPU -> WGPU naming discipline but have no entry are skipped
# and reported. Members omitted from a selected interface are likewise skipped
# and reported when they have a C counterpart; one-sided names remain loud
# mismatches.
#
# `[[descriptor]]` selects each descriptor conversion emitted into `core`.
# `target` overrides the joined C type only for an existing core-owned target.
# `unsupported` names WebIDL nested dictionaries that must reject when present
# and preserve their zero C form when absent. `zero` accounts for C-only fields.
# Nested `[[descriptor.strings]]` entries classify WebIDL nullability for every
# joined string member. Policy also records name maps, skips with reasons,
# native handles and handle sequences, flattened unions, typed chains,
# handle-or-enum unions, retained wrapper captures, precisely-scoped
# required-member defaults, and reasoned IDL-only enum-value skips. Member skips
# may reject present values instead of silently ignoring them. Policy is checked
# both ways: unknown, duplicate, dead, disagreeing, and unpoliced entries all
# fail generation.

schema_version = 1

# Introspection needs the C-to-WebIDL direction; descriptor enums otherwise
# generate only the WebIDL-to-C conversion direction.
reverse_enum = ["GPUFeatureName"]

# G13: selected interface members and Release families are derived from the
# joined subset. These lists account only for the non-obvious boundary: core-
# cached members, native references retained by wrappers/descriptors, transient
# objects that need no AddRef entry, and bootstrap/alternate C symbols outside
# the joined subset. Every subset interface must occur in exactly one AddRef
# list, and the exceptional symbols/skips are checked in both directions.
[dispatch]
skip_members = [
  { interface = "GPUBuffer", member = "size", reason = "the immutable size is cached from GPUBufferDescriptor" },
  { interface = "GPUBuffer", member = "usage", reason = "the immutable usage is cached from GPUBufferDescriptor" },
  { interface = "GPUBuffer", member = "mapState", reason = "the WebIDL mapping state is tracked by the core mapAsync/unmap state machine" },
]
add_ref = [
  { interface = "GPUDevice", reason = "adopted devices and child payloads retain the native device" },
  { interface = "GPUBuffer", reason = "mapped ranges and bind-group descriptors retain buffers" },
  { interface = "GPUTexture", reason = "texture views retain their parent texture" },
  { interface = "GPUTextureView", reason = "standard resource lifecycle keeps AddRef available for retained descriptors" },
  { interface = "GPUQueue", reason = "the SameObject queue wrapper owns an independent native reference" },
  { interface = "GPUShaderModule", reason = "compute-pipeline descriptors retain shader modules" },
  { interface = "GPUSampler", reason = "standard resource lifecycle keeps AddRef available for retained descriptors" },
  { interface = "GPUBindGroupLayout", reason = "bind-group descriptors retain their layout" },
  { interface = "GPUPipelineLayout", reason = "compute-pipeline descriptors retain explicit layouts" },
  { interface = "GPUBindGroup", reason = "standard resource lifecycle keeps AddRef available for command recording" },
  { interface = "GPUComputePipeline", reason = "standard resource lifecycle keeps AddRef available for command recording" },
  { interface = "GPURenderPipeline", reason = "standard resource lifecycle keeps AddRef available for render command recording" },
  { interface = "GPUQuerySet", reason = "standard resource lifecycle keeps AddRef available for command recording" },
]
no_add_ref = [
  { interface = "GPUCommandEncoder", reason = "the single-use encoder is adopted and never retained" },
  { interface = "GPUComputePassEncoder", reason = "the pass encoder is single-use and never retained" },
  { interface = "GPURenderPassEncoder", reason = "the pass encoder is single-use and never retained" },
  { interface = "GPURenderBundleEncoder", reason = "the single-use bundle encoder is adopted and never retained" },
  { interface = "GPURenderBundle", reason = "the reusable finished bundle is adopted and not retained by wrapper-side command recording" },
  { interface = "GPUCommandBuffer", reason = "the finished command buffer is adopted and consumed by submit" },
]
extra_symbols = [
  { symbol = "wgpuAdapterGetFeatures", reason = "GPUAdapter introspection is an extra-class surface outside the joined dispatch subset" },
  { symbol = "wgpuAdapterGetInfo", reason = "GPUAdapter introspection is an extra-class surface outside the joined dispatch subset" },
  { symbol = "wgpuAdapterGetLimits", reason = "GPUAdapter introspection is an extra-class surface outside the joined dispatch subset" },
  { symbol = "wgpuAdapterInfoFreeMembers", reason = "adapter-info output strings require immediate caller-side cleanup" },
  { symbol = "wgpuDeviceGetAdapterInfo", reason = "device adapter-info introspection uses an output struct rather than a WebIDL operation" },
  { symbol = "wgpuDeviceGetFeatures", reason = "device feature introspection uses an output struct rather than a WebIDL operation" },
  { symbol = "wgpuDeviceGetLimits", reason = "device limits introspection uses an output struct rather than a WebIDL operation" },
  { symbol = "wgpuInstanceProcessEvents", reason = "the settlement tick operates above the selected interface subset" },
  { symbol = "wgpuInstanceRequestAdapter", reason = "GPU bootstrap precedes the selected interface subset" },
  { symbol = "wgpuAdapterRequestDevice", reason = "GPU bootstrap precedes the selected interface subset" },
  { symbol = "wgpuAdapterRelease", reason = "the bootstrap adapter is outside the selected interface subset" },
  { symbol = "wgpuBufferGetConstMappedRange", reason = "getMappedRange selects the const C alternative for read mappings" },
  { symbol = "wgpuSupportedFeaturesFreeMembers", reason = "feature-list output storage requires immediate caller-side cleanup" },
]

[[enum_value_skip]]
enum = "GPUAutoLayoutMode"
value = "auto"
reason = "the C ABI represents auto layout with a null pipeline-layout handle"

[[name_map]]
idl = "GPUProgrammableStage"
c = "WGPUComputeState"
reason = "WebIDL names the reusable programmable stage while the C ABI names its compute specialization"

