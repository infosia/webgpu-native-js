# G14/G15: standard create-pattern lifecycles are emitted from the joined
# creator/descriptor model. All remaining method/property bodies are existing
# core functions named here; mappings and omissions are checked in both
# directions. Retention extensions are additive only (none are needed for the
# current surface).
[lifecycle]
standard_interfaces = [
  "GPUShaderModule",
  "GPUSampler",
  "GPUTexture",
  "GPUTextureView",
  "GPUBindGroupLayout",
  "GPUPipelineLayout",
  "GPUBindGroup",
  "GPUComputePipeline",
  "GPURenderPipeline",
  "GPUQuerySet",
  "GPUCommandEncoder",
]
extra_class_interfaces = ["GPU", "GPUAdapter"]

